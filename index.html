<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UQ Club Events</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #222;
        }
        h1 { margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 32px; font-size: 0.9em; }
        .event {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .event h3 { margin: 0 0 4px 0; }
        .event .date { color: #888; font-size: 0.85em; margin-bottom: 12px; }
        .event .description { white-space: pre-wrap; font-size: 0.95em; line-height: 1.5; }
        .no-events { color: #999; }
    </style>
</head>
<body>

<h1>UQ Club Events</h1>
<p class="subtitle">Automatically updated daily from Instagram.</p>

<div id="events"><p>Loading events...</p></div>

<script>
fetch("events.json")
    .then(response => response.json())
    .then(events => {
        const container = document.getElementById("events");
        container.innerHTML = "";

        // Only show future events
        const today = new Date().toISOString().split("T")[0];
        const upcoming = events.filter(e => e.date >= today);

        if (upcoming.length === 0) {
            container.innerHTML = "<p class='no-events'>No upcoming events found.</p>";
            return;
        }

        upcoming.forEach(event => {
            const div = document.createElement("div");
            div.className = "event";
            div.innerHTML = `
                <h3>@${event.club}</h3>
                <div class="date">${event.date}</div>
                <div class="description">${escapeHtml(event.description)}</div>
            `;
            container.appendChild(div);
        });
    })
    .catch(() => {
        document.getElementById("events").innerHTML = "<p>Failed to load events.</p>";
    });

function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}
</script>

</body>
</html>

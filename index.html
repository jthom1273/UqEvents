<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UQ Club Events</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #222;
        }
        h1 { margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 16px; font-size: 0.9em; }
        .search-row { display: flex; gap: 8px; margin-bottom: 32px; }
        .search-row input {
            flex: 1;
            padding: 6px 10px;
            font-size: 0.9em;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        .search-row input:focus { border-color: #aaa; }
        .search-row button {
            padding: 6px 14px;
            font-size: 0.9em;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            color: #555;
        }
        .search-row button:hover { background: #f5f5f5; }
        .results-meta { font-size: 0.8em; color: #999; margin-top: 4px; margin-bottom: 16px; }
        .event {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .event h3 { margin: 0 0 4px 0; }
        .event .date { color: #888; font-size: 0.85em; margin-bottom: 12px; }
        .event .description { white-space: pre-wrap; font-size: 0.95em; line-height: 1.5; }
        .no-events { color: #999; }
        mark { background: #ffe066; border-radius: 2px; padding: 0 2px; }
    </style>
</head>
<body>

<h1>UQ Club Events</h1>
<p class="subtitle">Automatically updated daily from Instagram.</p>

<div class="search-row">
    <input id="searchInput" type="text" placeholder="Filter by keyword — separate multiple with %" autocomplete="off" />
    <button id="clearBtn">Clear</button>
</div>
<div class="results-meta" id="resultsMeta"></div>

<div id="events"><p>Loading events...</p></div>

<script>
    let allEvents = [];

    fetch("events.json")
        .then(response => response.json())
        .then(data => {
            const today = new Date().toISOString().split("T")[0];
            allEvents = data
                .filter(e => e.date >= today)
                .sort((a, b) => a.date.localeCompare(b.date));
            render();
        })
        .catch(() => {
            document.getElementById("events").innerHTML = "<p>Failed to load events.</p>";
        });

    const input = document.getElementById("searchInput");
    document.getElementById("clearBtn").addEventListener("click", () => { input.value = ""; render(); });
    input.addEventListener("keydown", e => { if (e.key === "Enter") render(); });
    input.addEventListener("input", () => { if (input.value.includes("%")) render(); });

    function getKeywords() {
        return input.value.split("%").map(s => s.trim().toLowerCase()).filter(Boolean);
    }

    function render() {
        const keywords = getKeywords();
        const container = document.getElementById("events");
        const meta = document.getElementById("resultsMeta");
        container.innerHTML = "";

        let filtered = allEvents;
        if (keywords.length > 0) {
            filtered = allEvents.filter(e => {
                const haystack = (e.club + " " + e.description).toLowerCase();
                return keywords.every(kw => haystack.includes(kw));
            });
        }

        meta.textContent = keywords.length > 0
            ? filtered.length + " of " + allEvents.length + " events match"
            : allEvents.length + " upcoming events";

        if (filtered.length === 0) {
            container.innerHTML = "<p class='no-events'>No events match your search.</p>";
            return;
        }

        filtered.forEach(event => {
            const div = document.createElement("div");
            div.className = "event";
            const desc = keywords.length > 0
                ? highlight(escapeHtml(event.description), keywords)
                : escapeHtml(event.description);
            div.innerHTML =
                "<h3>@" + escapeHtml(event.club) + "</h3>" +
                "<div class='date'>" + event.date + "</div>" +
                "<div class='description'>" + desc + "</div>";
            container.appendChild(div);
        });
    }

    function highlight(text, keywords) {
        keywords.forEach(kw => {
            const re = new RegExp("(" + kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
            text = text.replace(re, "<mark>$1</mark>");
        });
        return text;
    }

    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }
</script>

</body>
</html>

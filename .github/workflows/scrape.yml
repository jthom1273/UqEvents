name: Scrape Instagram Events

on:
  schedule:
    - cron: '0 14 * * *'  # Runs daily at midnight AEST (14:00 UTC)
  workflow_dispatch:       # Allows you to trigger it manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write cookies file from secret
        run: echo "${{ secrets.INSTAGRAM_COOKIES }}" > cookies.txt

      - name: Run scraper
        run: python download_posts.py

      - name: Run event parser
        run: python main.py

      - name: Commit updated events.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --staged --quiet || git commit -m "chore: update events [$(date -u '+%Y-%m-%d')]"
          git push
